name: Build deb Package (Ubuntu 24.04)

on:
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout stable branch
        uses: actions/checkout@v4
        with:
          ref: stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            python3-pip python3-venv \
            libssl-dev libprotobuf-dev protobuf-compiler \
            libwebsocketpp-dev \
            libgl-dev libx11-dev libxkbcommon-dev \
            libglib2.0-dev libfontconfig-dev libfreetype-dev \
            libegl-dev libpulse-dev gsfonts

      - name: Build Boost 1.88 from source
        run: |
          curl -L https://archives.boost.io/release/1.88.0/source/boost_1_88_0.tar.gz | tar xz
          cd boost_1_88_0
          ./bootstrap.sh --prefix=$HOME/boost-install
          ./b2 -j$(nproc) install --prefix=$HOME/boost-install \
            --with-iostreams --with-random --with-thread \
            --with-filesystem --with-program_options \
            --with-system --with-date_time

      - name: Install Qt 6.9.2 via aqtinstall
        run: |
          python3 -m venv /tmp/aqt-venv
          /tmp/aqt-venv/bin/pip install aqtinstall
          /tmp/aqt-venv/bin/aqt install-qt linux desktop 6.9.2 \
            -m qtwebsockets qtmultimedia qtshadertools \
            -O $HOME/qt6

      - name: Build pokerth_client
        run: |
          QT_DIR="$HOME/qt6/6.9.2/gcc_64"
          rm -f cmake/FindBoost.cmake
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$HOME/pokerth-install/usr \
            -DBOOST_ROOT=$HOME/boost-install \
            -DCMAKE_POLICY_DEFAULT_CMP0144=NEW \
            -DCMAKE_PREFIX_PATH="${QT_DIR}" \
            -DQt6_DIR="${QT_DIR}/lib/cmake/Qt6" \
            -S . -B ./build
          cmake --build ./build \
            --target pokerth_client pokerth_lib pokerth_db pokerth_protocol zlib_compress \
            -j$(nproc)
          cmake --install ./build --component pokerth_client

      - name: Assemble deb package
        run: |
          VERSION=$(grep 'POKERTH_BETA_RELEASE_STRING' src/game_defs.h | grep -oP '"\K[^"]+')
          QT_DIR="$HOME/qt6/6.9.2/gcc_64"
          PKG_DIR=pokerth_${VERSION}_amd64
          INSTALL=$HOME/pokerth-install/usr

          mkdir -p ${PKG_DIR}/DEBIAN
          # Copy installed files (preserves /usr/ prefix for deb)
          mkdir -p ${PKG_DIR}/usr
          cp -r ${INSTALL}/* ${PKG_DIR}/usr/

          # Bundle required Qt libs
          mkdir -p ${PKG_DIR}/usr/lib/pokerth
          for lib in Core Gui Widgets Network Sql Xml Multimedia Svg OpenGL DBus XcbQpa WaylandClient WebSockets; do
            cp -a ${QT_DIR}/lib/libQt6${lib}.so* ${PKG_DIR}/usr/lib/pokerth/ 2>/dev/null || true
          done
          for iculib in libicudata libicui18n libicuuc; do
            cp -a ${QT_DIR}/lib/${iculib}.so* ${PKG_DIR}/usr/lib/pokerth/ 2>/dev/null || true
          done

          # Bundle Qt plugins
          mkdir -p ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/platforms
          cp -a ${QT_DIR}/plugins/platforms/libqxcb.so          ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/platforms/
          cp -a ${QT_DIR}/plugins/platforms/libqminimal.so       ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/platforms/ 2>/dev/null || true
          mkdir -p ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/imageformats
          cp -a ${QT_DIR}/plugins/imageformats/*.so              ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/imageformats/
          mkdir -p ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/sqldrivers
          cp -a ${QT_DIR}/plugins/sqldrivers/libqsqlite.so       ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/sqldrivers/
          mkdir -p ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/tls
          cp -a ${QT_DIR}/plugins/tls/*.so                       ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/tls/
          mkdir -p ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/multimedia
          cp -a ${QT_DIR}/plugins/multimedia/*.so                ${PKG_DIR}/usr/lib/pokerth/qt6-plugins/multimedia/ 2>/dev/null || true

          # Bundle Boost runtime libs
          cp -a $HOME/boost-install/lib/libboost_iostreams.so*   ${PKG_DIR}/usr/lib/pokerth/ 2>/dev/null || true
          cp -a $HOME/boost-install/lib/libboost_thread.so*      ${PKG_DIR}/usr/lib/pokerth/ 2>/dev/null || true
          cp -a $HOME/boost-install/lib/libboost_filesystem.so*  ${PKG_DIR}/usr/lib/pokerth/ 2>/dev/null || true
          cp -a $HOME/boost-install/lib/libboost_system.so*      ${PKG_DIR}/usr/lib/pokerth/ 2>/dev/null || true
          cp -a $HOME/boost-install/lib/libboost_date_time.so*   ${PKG_DIR}/usr/lib/pokerth/ 2>/dev/null || true

          # Fix desktop file: Exec must point to wrapper so LD_LIBRARY_PATH is set
          sed -i 's|^Exec=.*|Exec=pokerth|' ${PKG_DIR}/usr/share/applications/pokerth.desktop

          # Wrapper script that sets QT_PLUGIN_PATH and LD_LIBRARY_PATH
          mkdir -p ${PKG_DIR}/usr/bin
          cat > ${PKG_DIR}/usr/bin/pokerth << 'WRAPPER'
          #!/bin/sh
          export LD_LIBRARY_PATH=/usr/lib/pokerth:$LD_LIBRARY_PATH
          export QT_PLUGIN_PATH=/usr/lib/pokerth/qt6-plugins
          exec /usr/bin/pokerth_client "$@"
          WRAPPER
          chmod +x ${PKG_DIR}/usr/bin/pokerth

          # Copy font
          mkdir -p ${PKG_DIR}/usr/share/pokerth/data/fonts
          cp /usr/share/fonts/type1/gsfonts/n019003l.pfb \
            ${PKG_DIR}/usr/share/pokerth/data/fonts/ 2>/dev/null || true

          cat > ${PKG_DIR}/DEBIAN/control << EOF
Package: pokerth
Version: ${VERSION}
Architecture: amd64
Maintainer: PokerTH GbR <webmaster@pokerth.net>
Depends: libssl3t64, libprotobuf32t64, libgl1, libx11-6, libxkbcommon0, libfontconfig1, libfreetype6, libegl1, libpulse0, zlib1g
Section: games
Priority: optional
Homepage: https://www.pokerth.net
Description: PokerTH ${VERSION} - Texas Hold'em poker game
 PokerTH is an open-source multiplayer Texas Hold'em poker client and server.
 Play against up to nine computer opponents or online with other players.
EOF

          dpkg-deb --build --root-owner-group ${PKG_DIR}

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokerth-deb-ubuntu24.04
          path: "*.deb"
          retention-days: 30
