name: Build & Publish Snap

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq .tag_name)
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout release
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      # snapcraft expects snap/snapcraft.yaml in the repo root
      - name: Prepare snapcraft.yaml
        run: |
          mkdir -p snap
          cp docker/linux/snap/snapcraft.yaml snap/snapcraft.yaml

      - name: Set up LXD
        uses: canonical/setup-lxd@main

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build snap
        run: snapcraft --verbose 2>&1 | tee snapcraft.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapcraft-log
          path: snapcraft.log
          retention-days: 7

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokerth-snap
          path: "*.snap"
          retention-days: 30

  # Publish on release (auto) or manual trigger
  publish-snap:
    needs: build-snap
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    steps:
      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: pokerth-snap

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Publish to Snap Store
        run: |
          snapcraft upload --release=stable pokerth_*.snap
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
