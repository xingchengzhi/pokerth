name: Build & Publish Snap

on:
  push:
    branches: [stable, testing]
    paths:
      - 'docker/linux/snap/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/snap.yml'
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # snapcraft expects snap/snapcraft.yaml in the repo root
      - name: Prepare snapcraft.yaml
        run: |
          mkdir -p snap
          cp docker/linux/snap/snapcraft.yaml snap/snapcraft.yaml

      - name: Install snapcraft
        run: |
          sudo snap refresh
          sudo snap install snapcraft --classic

      - name: Build snap
        run: |
          snapcraft --verbose
        env:
          SNAPCRAFT_BUILD_ENVIRONMENT: host

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokerth-snap
          path: "*.snap"
          retention-days: 30

  # Publish only from stable branch (manual trigger or push)
  publish-snap:
    needs: build-snap
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/stable'
    steps:
      - name: Download snap artifact
        uses: actions/download-artifact@v4
        with:
          name: pokerth-snap

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Publish to Snap Store
        run: |
          snapcraft upload --release=stable pokerth_*.snap
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
