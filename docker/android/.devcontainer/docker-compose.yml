services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../android:/workspaces/android:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    networks:
      base_net:
        ipv4_address: 172.30.0.31
networks:
  base_net:
    external: true
