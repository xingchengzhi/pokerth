services:
  devcontainer:
    environment:
      - ANDROID_ARCH=x86_64
      - ANDROID_API_LEVEL=35
      - QT_VERSION=6.9.3
      - GRADLE_VERSION=8.3
      - ANDROID_NDK_VERSION=28.0.13004108
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../android:/workspaces/android:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    networks:
      base_net:
        ipv4_address: 172.30.0.31
networks:
  base_net:
    external: true
