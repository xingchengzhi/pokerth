name: pokerth
version: '2.0.6'
summary: Multiplayer Texas Hold'em poker client and server
description: |
  PokerTH is an open-source multiplayer Texas Hold'em poker client and server.
base: core22
grade: stable
confinement: strict

apps:
  pokerth:
    command: bin/pokerth
    desktop: pokerth.desktop
    plugs:
      - network
      - network-bind
      - home
      - removable-media
      - audio-playback
      - x11
      - wayland
      - opengl

parts:
  pokerth:
    plugin: cmake
    source: ../../../
    build-packages:
      - build-essential
      - cmake
      - ninja-build
      - qt6-base-dev
      - qt6-svg-dev
      - qt6-declarative-dev
      - qt6-tools-dev
      - linguist-qt6
      - qt6-websockets-dev
      - qt6-multimedia-dev
      - libssl-dev
      - libboost1.88-all-dev
      - libprotobuf-dev
      - protobuf-compiler
      - libwebsocketpp-dev
    stage-packages:
      - libqt6core6
      - libqt6gui6
      - libqt6widgets6
      - libqt6svg6
      - libqt6websockets6
      - libx11-6
      - libssl3
      - zlib1g
      - libprotobuf32
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -G Ninja
