name: pokerth
version: '2.0.6'
summary: Multiplayer Texas Hold'em poker client and server
description: |
  PokerTH is an open-source multiplayer Texas Hold'em poker client and server.
base: core24
grade: stable
confinement: strict

apps:
  pokerth:
    command: bin/pokerth
    desktop: pokerth.desktop
    plugs:
      - network
      - network-bind
      - home
      - removable-media
      - audio-playback
      - x11
      - wayland
      - opengl

parts:
  # Build Boost 1.88 from source (Ubuntu 24.04 only has 1.83)
  boost:
    plugin: nil
    source: https://archives.boost.io/release/1.88.0/source/boost_1_88_0.tar.gz
    build-packages:
      - build-essential
      - python3-dev
    override-build: |
      cd $CRAFT_PART_SRC
      ./bootstrap.sh --prefix=$CRAFT_PART_INSTALL/usr
      ./b2 -j$(nproc) install --prefix=$CRAFT_PART_INSTALL/usr
    prime:
      - usr/lib
      - usr/include

  pokerth:
    after: [boost]
    plugin: cmake
    source: .
    build-packages:
      - build-essential
      - cmake
      - ninja-build
      - qt6-base-dev
      - qt6-svg-dev
      - qt6-declarative-dev
      - qt6-tools-dev
      - linguist-qt6
      - qt6-websockets-dev
      - qt6-multimedia-dev
      - libssl-dev
      - libprotobuf-dev
      - protobuf-compiler
      - libwebsocketpp-dev
    stage-packages:
      - libqt6core6t64
      - libqt6gui6
      - libqt6widgets6
      - libqt6svg6
      - libqt6websockets6
      - libx11-6
      - libssl3t64
      - zlib1g
      - libprotobuf-lite32t64
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -G Ninja
