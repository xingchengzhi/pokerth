name: pokerth
version: '2.0.6'
title: PokerTH
summary: Multiplayer Texas Hold'em poker client and server
description: |
  PokerTH is an open-source multiplayer Texas Hold'em poker client and server.
  Play Texas Hold'em against up to nine computer opponents or online with
  other players from around the world.
license: AGPL-3.0-only
contact: https://github.com/pokerth/pokerth/issues
issues: https://github.com/pokerth/pokerth/issues
source-code: https://github.com/pokerth/pokerth
website: https://www.pokerth.net
base: core24
grade: stable
confinement: strict

apps:
  pokerth:
    command: bin/pokerth_client
    desktop: share/applications/pokerth.desktop
    plugs:
      - network
      - network-bind
      - home
      - removable-media
      - audio-playback
      - x11
      - wayland
      - opengl

parts:
  # Build Boost 1.88 from source (Ubuntu 24.04 only has 1.83)
  boost:
    plugin: nil
    source: https://archives.boost.io/release/1.88.0/source/boost_1_88_0.tar.gz
    build-packages:
      - build-essential
      - python3-dev
    override-build: |
      cd $CRAFT_PART_SRC
      ./bootstrap.sh --prefix=$CRAFT_PART_INSTALL/usr
      ./b2 -j$(nproc) install --prefix=$CRAFT_PART_INSTALL/usr
    prime:
      - usr/lib/libboost_iostreams*
      - usr/lib/libboost_random*
      - usr/lib/libboost_thread*
      - usr/lib/libboost_filesystem*
      - usr/lib/libboost_program_options*
      - usr/lib/libboost_regex*
      - usr/lib/libboost_system*
      - usr/lib/libboost_chrono*
      - usr/lib/libboost_date_time*
      - usr/lib/libboost_atomic*
      - usr/lib/libboost_serialization*
      - usr/lib/libboost_log*
      - usr/lib/libboost_charconv*

  # Install Qt 6.9.2 via aqtinstall (Ubuntu 24.04 only has Qt 6.4.2)
  qt6:
    plugin: nil
    build-packages:
      - python3-pip
      - python3-venv
    override-build: |
      python3 -m venv /tmp/aqt-venv
      /tmp/aqt-venv/bin/pip install aqtinstall
      /tmp/aqt-venv/bin/aqt install-qt linux desktop 6.9.2 \
        -m qtwebsockets qtmultimedia qt5compat qtshadertools \
        -O $CRAFT_PART_INSTALL/opt/qt6
    override-prime: |
      # Qt libs/plugins are copied selectively in the pokerth part,
      # so exclude the full aqtinstall tree from the snap to avoid duplicates
      true

  pokerth:
    after: [boost, qt6]
    plugin: nil
    source: .
    build-packages:
      - build-essential
      - cmake
      - ninja-build
      - libssl-dev
      - libprotobuf-dev
      - protobuf-compiler
      - libwebsocketpp-dev
      - libgl-dev
      - libx11-dev
      - libxkbcommon-dev
      - libglib2.0-dev
      - libfontconfig-dev
      - libfreetype-dev
      - libegl-dev
      - libpulse-dev
    stage-packages:
      - libx11-6
      - libssl3t64
      - zlib1g
      - libprotobuf32t64
      - libgl1
      - libxkbcommon0
      - libfontconfig1
      - libfreetype6
      - libicu74
      - libegl1
      - libpulse0
      - libsndfile1
      - libxcb-cursor0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-render-util0
      - libxcb-render0
      - libxcb-shape0
      - libxcb-util1
      - libxcb-xkb1
      - libxkbcommon-x11-0
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
    override-build: |
      # Remove outdated custom FindBoost.cmake that disables imported targets
      # for Boost >= 1.66 — CMake's built-in module handles 1.88 correctly
      rm -f ${CRAFT_PART_SRC}/cmake/FindBoost.cmake
      QT_DIR="${CRAFT_STAGE}/opt/qt6/6.9.2/gcc_64"
      cmake ${CRAFT_PART_SRC} \
        -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=${CRAFT_PART_INSTALL} \
        -DBOOST_ROOT=${CRAFT_STAGE}/usr \
        -DCMAKE_POLICY_DEFAULT_CMP0144=NEW \
        -DCMAKE_PREFIX_PATH="${QT_DIR}" \
        -DQt6_DIR="${QT_DIR}/lib/cmake/Qt6"
      cmake --build . --target pokerth_client pokerth_lib pokerth_db pokerth_protocol zlib_compress -j$(nproc)
      cmake --install . --component pokerth_client
      # Copy icon for desktop file
      mkdir -p ${CRAFT_PART_INSTALL}/share/icons/hicolor/256x256/apps
      cp ${CRAFT_PART_SRC}/pokerth.png ${CRAFT_PART_INSTALL}/share/icons/hicolor/256x256/apps/pokerth.png
      # Copy only needed Qt runtime libs into snap
      mkdir -p ${CRAFT_PART_INSTALL}/lib
      for lib in Core Gui Widgets Network Sql Xml Multimedia MultimediaWidgets Svg SvgWidgets WebSockets OpenGL OpenGLWidgets Core5Compat DBus XcbQpa WaylandClient WlShellIntegration; do
        cp -a ${QT_DIR}/lib/libQt6${lib}.so* ${CRAFT_PART_INSTALL}/lib/ 2>/dev/null || true
      done
      # Copy ICU libs needed by Qt
      cp -a ${QT_DIR}/lib/libicu*.so* ${CRAFT_PART_INSTALL}/lib/ 2>/dev/null || true
      # Copy Qt plugins (only needed ones)
      mkdir -p ${CRAFT_PART_INSTALL}/plugins
      for plugin in platforms imageformats sqldrivers tls multimedia networkinformation platformthemes platforminputcontexts iconengines; do
        cp -a ${QT_DIR}/plugins/${plugin} ${CRAFT_PART_INSTALL}/plugins/ 2>/dev/null || true
      done
